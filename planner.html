<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0a0a0a; color: #d4d4d4; font-family: 'DM Sans', sans-serif; }
  body { overflow-x: hidden; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  /* ── Tab bar ── */
  #tab-bar { position: sticky; top: 0; z-index: 50; background: #0a0a0a; display: flex; border-bottom: 1px solid #1a1a1a; max-width: 480px; margin: 0 auto; }
  .tab-btn { flex: 1; background: none; border: none; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: #444; padding: 13px 0 11px; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
  .tab-btn.active { color: #e8e0d0; border-bottom-color: #C9A97E; }

  /* ── Pages ── */
  .page { display: none; }
  .page.active { display: block; }
  #app, #grocery-app { max-width: 480px; margin: 0 auto; padding: 20px 16px 80px; }

  h1 { font-family: 'DM Serif Display', serif; font-size: 30px; color: #e8e0d0; margin-bottom: 2px; }
  .subtitle { font-family: 'DM Mono', monospace; font-size: 12px; color: #555; letter-spacing: 0.08em; margin-bottom: 16px; }

  /* ── Streak ── */
  .streak-banner { display: flex; align-items: center; gap: 12px; background: #111; border: 1px solid #222; border-radius: 6px; padding: 12px 14px; margin-bottom: 20px; }
  .streak-flame { font-size: 24px; line-height: 1; }
  .streak-count { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 600; line-height: 1; color: #C9A97E; }
  .streak-count.zero { color: #444; }
  .streak-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: #444; margin-top: 3px; letter-spacing: 0.06em; }

  /* ── Day cards ── */
  .day-card { border-radius: 6px; margin-bottom: 10px; border: 1px solid #181818; background: #0e0e0e; }
  .day-card.today { background: #141414; border-color: #2a2a2a; }
  .day-header { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; background: none; border: none; text-align: left; }
  .day-title-row { display: flex; align-items: center; gap: 10px; }
  .day-label { font-family: 'DM Serif Display', serif; font-size: 22px; color: #888; }
  .day-card.today .day-label { color: #e8e0d0; }
  .today-badge { font-family: 'DM Mono', monospace; font-size: 9px; color: #7EB8C9; border: 1px solid #7EB8C966; border-radius: 2px; padding: 1px 6px; letter-spacing: 1.5px; }
  .day-arrow { color: #555; font-size: 13px; }
  .day-body { padding: 4px 14px 14px; display: none; }
  .day-body.open { display: block; }

  /* ── Category sections ── */
  .cat-section { margin-bottom: 14px; }
  .cat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .cat-label { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 700; letter-spacing: 1px; }
  .cat-line { flex: 1; height: 1px; opacity: 0.2; }
  .cat-empty { font-family: 'DM Sans', sans-serif; color: #444; font-size: 14px; font-style: italic; padding-left: 14px; margin-bottom: 4px; }

  /* ── Tasks ── */
  .task-row { position: relative; display: flex; align-items: flex-start; gap: 8px; padding: 3px 0 3px 4px; }
  .task-check { width: 18px; height: 18px; min-width: 18px; border-radius: 3px; border: 1.5px solid #555; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 2px; transition: background 0.15s, border-color 0.15s; flex-shrink: 0; }
  .task-check svg { display: none; }
  .task-check.done svg { display: block; }
  .task-text { flex: 1; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #d4d4d4; line-height: 1.5; word-break: break-word; }
  .task-text.done { color: #444; text-decoration: line-through; }
  .task-text[contenteditable="true"] { outline: none; border-bottom: 1px solid #2a2a2a; color: #e8e0d0; padding-bottom: 1px; cursor: text; }
  .task-edit { background: none; border: none; color: #444; cursor: pointer; font-size: 13px; padding: 0 3px; line-height: 1; margin-top: 2px; flex-shrink: 0; opacity: 0.4; }
  .task-edit:hover { opacity: 1; color: #888; }
  .task-row:hover .task-edit { opacity: 0.7; }
  .task-delete { background: none; border: none; color: #444; cursor: pointer; font-size: 18px; padding: 0 3px; line-height: 1; margin-top: 1px; flex-shrink: 0; }

  /* ── Input row ── */
  .input-row { display: flex; gap: 6px; margin-top: 6px; padding-left: 4px; }
  .task-input { flex: 1; background: #161616; border: none; border-bottom: 1px solid #2a2a2a; color: #aaa; font-size: 14px; font-family: 'DM Mono', monospace; padding: 4px; outline: none; }
  .task-input::placeholder { color: #444; }
  .add-btn { background: none; border-radius: 2px; font-family: 'DM Mono', monospace; font-size: 13px; padding: 3px 10px; cursor: pointer; border: 1px solid; }

  /* ── EOD bar ── */
  .eod-bar { display: flex; gap: 8px; margin-top: 18px; padding-top: 14px; border-top: 1px solid #1a1a1a; }
  .eod-btn { flex: 1; background: none; border: 1px solid #222; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em; padding: 8px 6px; cursor: pointer; color: #555; transition: color 0.15s, border-color 0.15s; }
  .eod-btn:hover { border-color: #3a3a3a; color: #888; }
  .eod-btn.danger:hover { border-color: #7a3030; color: #C97E7E; }

  /* ── Legend ── */
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-family: 'DM Mono', monospace; font-size: 12px; color: #444; }

  /* ── Deadlines — redesigned ── */
  .deadlines-section { margin-top: 24px; margin-bottom: 8px; }
  .deadlines-section-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 0 2px; }
  .deadlines-section-title { font-family: 'DM Serif Display', serif; font-size: 13px; letter-spacing: 0.12em; color: #555; text-transform: uppercase; }
  .deadlines-section-line { flex: 1; height: 1px; background: linear-gradient(to right, #2a2a2a, transparent); }
  .deadlines-section-toggle { background: none; border: none; font-family: 'DM Mono', monospace; font-size: 10px; color: #444; cursor: pointer; padding: 2px 6px; }

  .dl-chips { display: flex; flex-direction: column; gap: 6px; }
  .dl-chip { position: relative; display: flex; align-items: center; gap: 0; border-radius: 6px; overflow: hidden; background: #0d0d0d; border: 1px solid #1e1e1e; transition: border-color 0.15s; }
  .dl-chip:hover { border-color: #2a2a2a; }
  .dl-chip.goal-chip { border-color: #1e2a1e; background: #0a0f0a; }
  .dl-chip-accent { width: 3px; align-self: stretch; flex-shrink: 0; }
  .dl-chip-inner { flex: 1; display: flex; align-items: center; gap: 10px; padding: 9px 10px; min-width: 0; }
  .dl-chip-countdown { flex-shrink: 0; text-align: center; width: 38px; }
  .dl-chip-days { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 600; line-height: 1; }
  .dl-chip-unit { font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.1em; color: #444; margin-top: 1px; }
  .dl-chip-divider { width: 1px; align-self: stretch; background: #1a1a1a; flex-shrink: 0; }
  .dl-chip-info { flex: 1; min-width: 0; padding-left: 10px; }
  .dl-chip-name { font-family: 'DM Sans', sans-serif; font-size: 13px; color: #ccc; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dl-chip-name.overdue { color: #C97E7E; }
  .dl-chip-name[contenteditable="true"] { outline: none; border-bottom: 1px solid #333; white-space: normal; color: #e8e0d0; overflow: visible; }
  .dl-chip-sub { font-family: 'DM Mono', monospace; font-size: 9px; color: #3a3a3a; margin-top: 2px; display: flex; align-items: center; gap: 5px; }
  .dl-chip-sub input[type="date"] { background: none; border: none; border-bottom: 1px solid #222; color: #555; font-family: 'DM Mono', monospace; font-size: 9px; outline: none; color-scheme: dark; width: 95px; }
  .dl-chip-goose { font-size: 13px; flex-shrink: 0; line-height: 1; }
  .dl-chip-actions { display: flex; flex-direction: column; justify-content: center; gap: 0; padding: 0 6px; opacity: 0; transition: opacity 0.15s; }
  .dl-chip:hover .dl-chip-actions { opacity: 1; }
  .dl-chip-btn { background: none; border: none; cursor: pointer; font-size: 12px; padding: 3px 2px; color: #444; line-height: 1; }
  .dl-chip-btn:hover { color: #aaa; }
  .dl-chip-btn.del:hover { color: #C97E7E; }
  .dl-chip-goto { font-family: 'DM Mono', monospace; font-size: 9px; color: #2d5a2d; background: none; border: none; cursor: pointer; padding: 0; letter-spacing: 0.06em; }
  .dl-chip-goto:hover { color: #7EC97E; }
  .dl-add-row { display: flex; gap: 6px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
  .dl-name-input { flex: 1; min-width: 100px; background: none; border: none; border-bottom: 1px solid #1e1e1e; color: #aaa; font-size: 12px; font-family: 'DM Mono', monospace; padding: 4px 2px; outline: none; }
  .dl-name-input::placeholder { color: #2a2a2a; }
  .dl-date-input { background: none; border: none; border-bottom: 1px solid #1e1e1e; color: #555; font-family: 'DM Mono', monospace; font-size: 12px; padding: 4px 2px; outline: none; color-scheme: dark; }
  .dl-empty { font-family: 'DM Sans', sans-serif; color: #333; font-size: 13px; font-style: italic; padding: 4px; }

  /* ── Pixel botanicals ── */
  .pixel-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
  #app, #grocery-app, #selfcare-app, #goals-app { position: relative; z-index: 1; }
  #tab-bar { position: sticky; top: 0; z-index: 52; }
  .day-card, .store-card, .goal-card, .deadlines-section { position: relative; }

  /* ── Grocery ── */
  .grocery-header-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 16px; }
  .store-card { border-radius: 6px; margin-bottom: 10px; border: 1px solid #181818; background: #0e0e0e; }
  .store-header { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; background: none; border: none; text-align: left; gap: 8px; }
  .store-name-wrap { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .store-name { font-family: 'DM Serif Display', serif; font-size: 20px; color: #e8e0d0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .store-count { font-family: 'DM Mono', monospace; font-size: 10px; color: #444; }
  .store-arrow { color: #555; font-size: 13px; flex-shrink: 0; }
  .store-body { padding: 4px 14px 14px; display: none; }
  .store-body.open { display: block; }

  .store-actions { display: flex; gap: 6px; margin-top: 14px; padding-top: 12px; border-top: 1px solid #1a1a1a; }
  .store-act-btn { background: none; border: 1px solid #222; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; padding: 6px 10px; cursor: pointer; color: #555; transition: color 0.15s, border-color 0.15s; }
  .store-act-btn:hover { border-color: #3a3a3a; color: #888; }
  .store-act-btn.danger:hover { border-color: #7a3030; color: #C97E7E; }

  .add-store-row { display: flex; gap: 6px; margin-top: 16px; }
  .store-name-input { flex: 1; background: #111; border: 1px solid #222; border-radius: 4px; color: #aaa; font-size: 14px; font-family: 'DM Mono', monospace; padding: 8px 10px; outline: none; }
  .store-name-input::placeholder { color: #333; }
  .store-add-btn { background: none; border: 1px solid #2a2a2a; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 12px; padding: 8px 14px; cursor: pointer; color: #666; transition: color 0.15s, border-color 0.15s; }
  .store-add-btn:hover { color: #aaa; border-color: #444; }

  /* store name inline edit */
  .store-name[contenteditable="true"] { outline: none; border-bottom: 1px solid #444; min-width: 40px; cursor: text; }

  /* ── Grocery item checkbox (round) ── */
  .groc-check { width: 18px; height: 18px; min-width: 18px; border-radius: 50%; border: 1.5px solid #555; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 2px; transition: background 0.15s, border-color 0.15s; flex-shrink: 0; }
  .groc-check svg { display: none; }
  .groc-check.done svg { display: block; }

  /* ── Self Care ── */
  #selfcare-app { max-width: 480px; margin: 0 auto; padding: 20px 16px 80px; }
  .sc-section { margin-bottom: 24px; }
  .sc-section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .sc-section-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: #e8e0d0; }
  .sc-section-line { flex: 1; height: 1px; background: #222; }
  .sc-section-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: #444; letter-spacing: 0.08em; margin-bottom: 14px; margin-top: -8px; }

  .sc-item { display: flex; align-items: flex-start; gap: 10px; padding: 5px 4px; border-radius: 4px; transition: background 0.1s; }
  .sc-item.conditional { opacity: 0.38; }
  .sc-item.conditional.active-today { opacity: 1; }
  .sc-check { width: 20px; height: 20px; min-width: 20px; border-radius: 4px; border: 1.5px solid #444; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: background 0.15s, border-color 0.15s; flex-shrink: 0; }
  .sc-check svg { display: none; }
  .sc-check.done svg { display: block; }
  .sc-item-body { flex: 1; }
  .sc-item-name { font-family: 'DM Sans', sans-serif; font-size: 14px; color: #d4d4d4; line-height: 1.4; }
  .sc-item-name.done { color: #3a3a3a; text-decoration: line-through; }
  .sc-item-tag { display: inline-block; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.1em; border-radius: 2px; padding: 1px 5px; margin-top: 2px; }
  .sc-item-note { font-family: 'DM Mono', monospace; font-size: 10px; color: #555; margin-top: 2px; }

  .sc-progress { background: #111; border: 1px solid #1e1e1e; border-radius: 6px; padding: 12px 14px; margin-bottom: 20px; display: flex; align-items: center; gap: 14px; }
  .sc-prog-ring { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
  .sc-prog-ring svg { transform: rotate(-90deg); }
  .sc-prog-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600; color: #e8e0d0; }
  .sc-prog-text { flex: 1; }
  .sc-prog-title { font-family: 'DM Mono', monospace; font-size: 12px; color: #888; letter-spacing: 0.06em; }
  .sc-prog-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: #444; margin-top: 3px; }

  .sc-alt-badge { display: inline-flex; align-items: center; gap: 5px; font-family: 'DM Mono', monospace; font-size: 10px; border: 1px solid; border-radius: 3px; padding: 2px 8px; margin-bottom: 10px; }

  /* ── Trackers (water + multivitamin) ── */
  .sc-trackers { display: flex; gap: 10px; margin-bottom: 20px; }
  .sc-tracker-card { flex: 1; background: #111; border: 1px solid #1e1e1e; border-radius: 6px; padding: 12px 12px 10px; }
  .sc-tracker-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em; color: #555; margin-bottom: 8px; }
  .sc-tracker-value { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 600; line-height: 1; margin-bottom: 6px; }
  .sc-tracker-sub { font-family: 'DM Mono', monospace; font-size: 9px; color: #444; margin-bottom: 10px; }
  .sc-tracker-btns { display: flex; gap: 6px; }
  .sc-tracker-btn { flex: 1; background: none; border: 1px solid #222; border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 14px; padding: 5px 0; cursor: pointer; color: #555; transition: color 0.15s, border-color 0.15s; }
  .sc-tracker-btn:hover { color: #aaa; border-color: #444; }
  .sc-tracker-btn.primary { font-size: 18px; }
  .water-dots { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .water-dot { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid #2a2a2a; cursor: pointer; transition: background 0.15s, border-color 0.15s; flex-shrink: 0; }
  .water-dot.filled { background: #7EB8C9; border-color: #7EB8C9; }
  .multi-pill { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .multi-toggle { width: 36px; height: 20px; border-radius: 10px; border: 1.5px solid #2a2a2a; background: transparent; cursor: pointer; position: relative; transition: background 0.2s, border-color 0.2s; flex-shrink: 0; }
  .multi-toggle::after { content:""; position: absolute; width: 12px; height: 12px; border-radius: 50%; background: #444; top: 2px; left: 2px; transition: transform 0.2s, background 0.2s; }
  .multi-toggle.on { background: #7EC97E22; border-color: #7EC97E; }
  .multi-toggle.on::after { background: #7EC97E; transform: translateX(16px); }
  .multi-label { font-family: 'DM Sans', sans-serif; font-size: 13px; color: #888; }
  .multi-label.done { color: #3a3a3a; text-decoration: line-through; }

  /* ── Editable routine step names ── */
  .sc-item-name[contenteditable="true"] { outline: none; border-bottom: 1px solid #2a2a2a; color: #e8e0d0; padding-bottom: 1px; cursor: text; }
  .sc-edit-btn { background: none; border: none; color: #333; cursor: pointer; font-size: 12px; padding: 0 3px; line-height: 1; margin-top: 2px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
  .sc-item:hover .sc-edit-btn { opacity: 0.6; }
  .sc-edit-btn:hover { opacity: 1 !important; color: #888; }


  /* ── Goals ── */
  #goals-app { max-width: 480px; margin: 0 auto; padding: 20px 16px 80px; }

  .goals-filter-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .goals-filter-btn { background: none; border: 1px solid #222; border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; padding: 5px 10px; cursor: pointer; color: #444; transition: color 0.15s, border-color 0.15s, background 0.15s; }
  .goals-filter-btn.active { color: #e8e0d0; border-color: #444; background: #181818; }
  .goals-filter-btn:hover:not(.active) { color: #888; border-color: #333; }

  .goal-card { border-radius: 6px; margin-bottom: 12px; border: 1px solid #1a1a1a; background: #0e0e0e; overflow: hidden; }
  .goal-card.pinned { border-color: #C9A97E44; background: #111008; }
  .goal-card.done-card { opacity: 0.5; }

  .goal-top { padding: 13px 14px 10px; }
  .goal-title-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
  .goal-pin-btn { background: none; border: none; font-size: 13px; cursor: pointer; padding: 1px 2px; opacity: 0.3; flex-shrink: 0; margin-top: 1px; transition: opacity 0.15s; }
  .goal-pin-btn.pinned { opacity: 1; }
  .goal-pin-btn:hover { opacity: 0.8; }
  .goal-title { font-family: 'DM Serif Display', serif; font-size: 19px; color: #e8e0d0; flex: 1; line-height: 1.3; word-break: break-word; }
  .goal-title[contenteditable="true"] { outline: none; border-bottom: 1px solid #333; }
  .goal-title.done { color: #3a3a3a; text-decoration: line-through; }

  .goal-meta-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .goal-cat-badge { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.1em; border-radius: 2px; padding: 2px 6px; border: 1px solid; cursor: pointer; transition: opacity 0.15s; }
  .goal-status-badge { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.1em; border-radius: 2px; padding: 2px 6px; border: 1px solid; cursor: pointer; }
  .goal-date-badge { font-family: 'DM Mono', monospace; font-size: 9px; color: #555; display: flex; align-items: center; gap: 4px; }
  .goal-date-badge input[type="date"] { background: none; border: none; border-bottom: 1px solid #2a2a2a; color: #555; font-family: 'DM Mono', monospace; font-size: 9px; outline: none; color-scheme: dark; padding: 0; width: 95px; }

  .goal-why { font-family: 'DM Sans', sans-serif; font-size: 12px; color: #555; font-style: italic; line-height: 1.5; margin-bottom: 8px; padding-left: 2px; }
  .goal-why[contenteditable="true"] { outline: none; color: #888; border-bottom: 1px solid #222; }
  .goal-why.empty::before { content: "Why does this matter? (tap ✎ to add)"; color: #333; font-style: italic; }

  .goal-desc { font-family: 'DM Sans', sans-serif; font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 10px; padding-left: 2px; }
  .goal-desc[contenteditable="true"] { outline: none; color: #aaa; border-bottom: 1px solid #222; }
  .goal-desc.empty::before { content: "Add a description…"; color: #333; }

  .goal-progress-bar-wrap { height: 3px; background: #1a1a1a; border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
  .goal-progress-bar { height: 100%; border-radius: 2px; transition: width 0.3s; }

  .goal-steps { padding: 0 14px 4px; border-top: 1px solid #141414; }
  .goal-steps-hdr { display: flex; align-items: center; justify-content: space-between; padding: 8px 0 6px; cursor: pointer; }
  .goal-steps-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: #444; }
  .goal-steps-arrow { font-size: 11px; color: #333; }
  .goal-step-row { display: flex; align-items: flex-start; gap: 8px; padding: 3px 0; }
  .goal-step-check { width: 16px; height: 16px; min-width: 16px; border-radius: 3px; border: 1.5px solid #333; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 2px; transition: background 0.15s, border-color 0.15s; flex-shrink: 0; }
  .goal-step-check svg { display: none; }
  .goal-step-check.done svg { display: block; }
  .goal-step-text { flex: 1; font-family: 'DM Sans', sans-serif; font-size: 13px; color: #aaa; line-height: 1.4; word-break: break-word; }
  .goal-step-text.done { color: #333; text-decoration: line-through; }
  .goal-step-text[contenteditable="true"] { outline: none; border-bottom: 1px solid #2a2a2a; color: #e8e0d0; }
  .goal-step-del { background: none; border: none; color: #333; cursor: pointer; font-size: 16px; padding: 0 2px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
  .goal-step-row:hover .goal-step-del { opacity: 1; }
  .goal-step-del:hover { color: #C97E7E; }
  .goal-step-add { display: flex; gap: 6px; margin-top: 4px; padding-bottom: 10px; }
  .goal-step-input { flex: 1; background: none; border: none; border-bottom: 1px solid #1e1e1e; color: #666; font-size: 12px; font-family: 'DM Mono', monospace; padding: 3px 2px; outline: none; }
  .goal-step-input::placeholder { color: #2a2a2a; }
  .goal-step-addbtn { background: none; border: 1px solid #1e1e1e; border-radius: 2px; font-family: 'DM Mono', monospace; font-size: 11px; padding: 2px 8px; cursor: pointer; color: #444; }
  .goal-step-addbtn:hover { color: #888; border-color: #333; }

  .goal-actions-bar { display: flex; gap: 6px; padding: 8px 14px 12px; border-top: 1px solid #111; }
  .goal-act-btn { background: none; border: 1px solid #1a1a1a; border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.06em; padding: 5px 8px; cursor: pointer; color: #444; transition: color 0.15s, border-color 0.15s; }
  .goal-act-btn:hover { color: #888; border-color: #333; }
  .goal-act-btn.danger:hover { color: #C97E7E; border-color: #7a3030; }

  .goal-add-card { border: 1px dashed #222; border-radius: 6px; padding: 14px; margin-bottom: 12px; }
  .goal-add-title { font-family: 'DM Mono', monospace; font-size: 11px; color: #444; letter-spacing: 0.08em; margin-bottom: 10px; }
  .goal-add-field { width: 100%; background: none; border: none; border-bottom: 1px solid #1e1e1e; color: #aaa; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 5px 2px; outline: none; margin-bottom: 10px; display: block; }
  .goal-add-field::placeholder { color: #333; }
  .goal-add-field.mono { font-family: 'DM Mono', monospace; font-size: 12px; }
  .goal-add-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
  .goal-add-select { background: #111; border: 1px solid #222; border-radius: 3px; color: #666; font-family: 'DM Mono', monospace; font-size: 11px; padding: 5px 8px; outline: none; cursor: pointer; }
  .goal-add-submit { background: none; border: 1px solid #C9A97E55; border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 14px; cursor: pointer; color: #C9A97E; margin-top: 4px; }
  .goal-add-submit:hover { background: #C9A97E11; }
  .goal-empty { font-family: 'DM Sans', sans-serif; color: #333; font-size: 14px; font-style: italic; padding: 20px 4px; text-align: center; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px); background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 12px; color: #888; padding: 8px 18px; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap; z-index: 1000; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Fireworks ── */
  .fw-canvas { position: fixed; pointer-events: none; z-index: 999; }
</style>
</head>
<body>
<canvas id="pixel-botanical" class="pixel-layer"></canvas>

<div id="tab-bar">
  <button class="tab-btn active" data-tab="planner">◈ PLANNER</button>
  <button class="tab-btn" data-tab="grocery">◇ GROCERY</button>
  <button class="tab-btn" data-tab="selfcare">◎ SELF CARE</button>
  <button class="tab-btn" data-tab="goals">◉ GOALS</button>
</div>

<div id="page-planner" class="page active">
  <div id="app"></div>
</div>

<div id="page-grocery" class="page">
  <div id="grocery-app"></div>
</div>

<div id="page-selfcare" class="page">
  <div id="selfcare-app"></div>
</div>

<div id="page-goals" class="page">
  <div id="goals-app"></div>
</div>

<script>
// ─────────────────────────────────────────────
// SHARED UTILS
// ─────────────────────────────────────────────
const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

function todayStr() { return new Date().toLocaleDateString("en-CA"); }
function dateStrOffset(n) { const d=new Date(); d.setDate(d.getDate()+n); return d.toLocaleDateString("en-CA"); }

function showToast(msg) {
  let t = document.getElementById("toast");
  if (!t) { t = document.createElement("div"); t.id="toast"; t.className="toast"; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._timer); t._timer = setTimeout(()=>t.classList.remove("show"), 2400);
}

function launchFireworks(el, color) {
  const rect=el.getBoundingClientRect(), size=120;
  const canvas=document.createElement("canvas"); canvas.className="fw-canvas";
  canvas.width=size; canvas.height=size;
  canvas.style.cssText=`width:${size}px;height:${size}px;left:${rect.left+rect.width/2-size/2}px;top:${rect.top+rect.height/2-size/2}px;`;
  document.body.appendChild(canvas);
  const ctx=canvas.getContext("2d"), cx=size/2, cy=size/2;
  const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
  const pal=[color,`rgb(${Math.min(r+60,255)},${Math.min(g+60,255)},${Math.min(b+60,255)})`,`rgb(${Math.max(r-40,0)},${Math.max(g-40,0)},${Math.max(b-40,0)})`, "#e8e0d0"];
  const pts=Array.from({length:36},(_,i)=>{const a=(i/36)*Math.PI*2,sp=1.5+Math.random()*2.5;return{x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-0.8,alpha:1,rad:2+Math.random()*2,col:pal[Math.floor(Math.random()*pal.length)],dec:0.02+Math.random()*0.01};});
  function draw(){ctx.clearRect(0,0,size,size);let alive=false;for(const p of pts){if(p.alpha<=0)continue;alive=true;ctx.save();ctx.globalAlpha=p.alpha;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.rad,0,Math.PI*2);ctx.fill();ctx.restore();p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.alpha-=p.dec;}if(alive)requestAnimationFrame(draw);else canvas.remove();}
  requestAnimationFrame(draw);
  // Also fire a shooting star
  if (window._botanicalShootingStar) window._botanicalShootingStar(el);
}

// Water ripple: called when a water dot is tapped
function launchWaterRipple(el) {
  if (window._botanicalWaterRipple) window._botanicalWaterRipple(el);
}

// Streak goose: called when streak increases
function launchStreakGoose() {
  if (window._botanicalStreakGoose) window._botanicalStreakGoose();
}

function makeEditableText(spanEl, getText, onSave) {
  // Toggle inline editing on a span
  const editBtn = document.createElement("button");
  editBtn.className = "task-edit"; editBtn.title = "Edit"; editBtn.textContent = "✎";
  editBtn.addEventListener("click", () => {
    if (spanEl.contentEditable === "true") {
      const v = spanEl.textContent.trim(); if (v) onSave(v);
      spanEl.contentEditable = "false"; editBtn.textContent = "✎"; editBtn.style.color = "";
    } else {
      spanEl.contentEditable = "true"; spanEl.focus();
      const range=document.createRange(); range.selectNodeContents(spanEl); range.collapse(false);
      const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
      editBtn.textContent = "✓";
    }
  });
  spanEl.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); editBtn.click(); }
    if (e.key === "Escape") { spanEl.textContent = getText(); spanEl.contentEditable = "false"; editBtn.textContent = "✎"; editBtn.style.color = ""; }
  });
  spanEl.addEventListener("blur", () => {
    if (spanEl.contentEditable === "true") {
      const v = spanEl.textContent.trim(); if (v) onSave(v);
      spanEl.contentEditable = "false"; editBtn.textContent = "✎"; editBtn.style.color = "";
    }
  });
  return editBtn;
}

// ─────────────────────────────────────────────
// TAB SWITCHING
// ─────────────────────────────────────────────
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("page-"+btn.dataset.tab).classList.add("active");
  });
});

// ─────────────────────────────────────────────
// PLANNER
// ─────────────────────────────────────────────
const CATEGORIES = ["Research","Work","Exercise","Life"];
const ICONS = {Research:"◈",Work:"◉",Exercise:"◎",Life:"◇"};
const COLORS = {Research:"#7EB8C9",Work:"#C9A97E",Exercise:"#7EC97E",Life:"#C97EAA"};

const pKey = (ds,cat) => `planner:${ds}:${cat}`;
const SKEY = "planner:streak";
const CARRY_KEY = "planner:lastCarryDate";

const getTasks    = (ds,cat) => { try{return JSON.parse(localStorage.getItem(pKey(ds,cat)))||[];}catch{return[];} };
const saveTasks   = (ds,cat,t) => localStorage.setItem(pKey(ds,cat),JSON.stringify(t));
const getStreak   = () => { try{return JSON.parse(localStorage.getItem(SKEY))||{count:0,lastCompleted:null};}catch{return{count:0,lastCompleted:null};} };
const saveStreak  = s => localStorage.setItem(SKEY,JSON.stringify(s));

// Auto-carry: move incomplete tasks from `fromDate` to `toDate`
function autoCarry(fromDate, toDate, silent=false) {
  // Skip if already carried this date pair
  const carried = localStorage.getItem(CARRY_KEY);
  if (carried === fromDate+"->"+toDate) return;

  let count = 0;
  for (const cat of CATEGORIES) {
    const tasks = getTasks(fromDate, cat);
    const incomplete = tasks.filter(t => !t.done);
    if (!incomplete.length) continue;
    const existing = getTasks(toDate, cat);
    const existingTexts = new Set(existing.map(t=>t.text.trim().toLowerCase()));
    const toAdd = incomplete.filter(t => !existingTexts.has(t.text.trim().toLowerCase()));
    if (!toAdd.length) continue;
    saveTasks(toDate, cat, [...existing, ...toAdd.map(t=>({id:Date.now()+Math.random(),text:t.text,done:false}))]);
    saveTasks(fromDate, cat, tasks.filter(t=>t.done));
    count += toAdd.length;
  }
  localStorage.setItem(CARRY_KEY, fromDate+"->"+toDate);
  if (count > 0 && !silent) showToast(`↪ Auto-carried ${count} task${count!==1?"s":""} from yesterday`);
}

// On-open carry: check if yesterday had incomplete tasks and carry them
function onOpenCarry() {
  const yesterday = dateStrOffset(-1);
  const today = todayStr();
  autoCarry(yesterday, today);
}

// Midnight carry: schedule a carry at the next midnight
function scheduleMidnightCarry() {
  const now = new Date();
  const midnight = new Date(now); midnight.setHours(24,0,0,100);
  const msUntilMidnight = midnight - now;
  setTimeout(() => {
    const fromDate = dateStrOffset(-1); // at midnight, "today" becomes tomorrow, so carry yesterday
    const toDate = todayStr();
    autoCarry(fromDate, toDate);
    renderPlanner(); // re-render since date may have changed
    scheduleMidnightCarry(); // schedule next midnight
  }, msUntilMidnight);
}

function getDayRange() {
  return Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()+i);
    return {label:DAYS[d.getDay()], isToday:i===0, dateStr:d.toLocaleDateString("en-CA")};
  });
}

function checkStreak(ds) {
  let anyTask=false, allDone=true;
  for (const cat of CATEGORIES) {
    const t=getTasks(ds,cat);
    if(t.length>0){anyTask=true; if(t.some(x=>!x.done)){allDone=false;break;}}
  }
  if(!anyTask||!allDone) return;
  const s=getStreak();
  if(s.lastCompleted===ds) return;
  const yd=new Date(); yd.setDate(yd.getDate()-1);
  const yStr=yd.toLocaleDateString("en-CA");
  saveStreak({count: s.lastCompleted===yStr ? s.count+1 : 1, lastCompleted:ds});
  renderStreakBanner();
  launchStreakGoose();
}

function renderStreakBanner() {
  const s=getStreak();
  const flames=s.count>=7?"🔥🔥🔥":s.count>=3?"🔥🔥":s.count>=1?"🔥":"—";
  const el=document.getElementById("streak-banner"); if(!el) return;
  el.innerHTML=`<span class="streak-flame">${flames}</span><div><div class="streak-count${s.count===0?" zero":""}">${s.count} day${s.count!==1?"s":""}</div><div class="streak-sub">${s.count===0?"COMPLETE TODAY TO START YOUR STREAK":`STREAK · LAST: ${s.lastCompleted}`}</div></div>`;
}

function renderTaskList(dateStr, cat, container) {
  const color=COLORS[cat];
  const tasks=getTasks(dateStr,cat);
  container.innerHTML="";
  if(!tasks.length){
    const e=document.createElement("div"); e.className="cat-empty"; e.textContent="no tasks"; container.appendChild(e);
  }
  tasks.forEach((task,idx)=>{
    const row=document.createElement("div"); row.className="task-row";
    const check=document.createElement("button");
    check.className="task-check"+(task.done?" done":"");
    check.style.borderColor=task.done?color:"#555";
    check.style.backgroundColor=task.done?color:"transparent";
    check.innerHTML=`<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#0d0d0d" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    check.addEventListener("click",()=>{
      const cur=getTasks(dateStr,cat); cur[idx].done=!cur[idx].done; saveTasks(dateStr,cat,cur);
      if(cur[idx].done) launchFireworks(check,color);
      renderTaskList(dateStr,cat,container); checkStreak(dateStr);
    });
    const text=document.createElement("span");
    text.className="task-text"+(task.done?" done":""); text.textContent=task.text;
    const editBtn=makeEditableText(text, ()=>task.text, v=>{
      if(task.done) return;
      const cur=getTasks(dateStr,cat); cur[idx].text=v; saveTasks(dateStr,cat,cur);
    });
    const del=document.createElement("button"); del.className="task-delete"; del.textContent="×";
    del.addEventListener("click",()=>{ const cur=getTasks(dateStr,cat); cur.splice(idx,1); saveTasks(dateStr,cat,cur); renderTaskList(dateStr,cat,container); });
    row.appendChild(check); row.appendChild(text); row.appendChild(editBtn); row.appendChild(del);
    container.appendChild(row);
  });
  const inputRow=document.createElement("div"); inputRow.className="input-row";
  const input=document.createElement("input"); input.className="task-input"; input.placeholder="+ add task"; input.type="text";
  const btn=document.createElement("button"); btn.className="add-btn"; btn.style.borderColor=color+"66"; btn.style.color=color; btn.textContent="add";
  function add(){ const v=input.value.trim(); if(!v) return; const cur=getTasks(dateStr,cat); cur.push({id:Date.now(),text:v,done:false}); saveTasks(dateStr,cat,cur); renderTaskList(dateStr,cat,container); }
  btn.addEventListener("click",add); input.addEventListener("keydown",e=>{if(e.key==="Enter")add();});
  inputRow.appendChild(input); inputRow.appendChild(btn);
  container.appendChild(inputRow);
}

function renderCatSection(dateStr, cat) {
  const color=COLORS[cat];
  const sec=document.createElement("div"); sec.className="cat-section";
  const hdr=document.createElement("div"); hdr.className="cat-header";
  const lbl=document.createElement("span"); lbl.className="cat-label"; lbl.style.color=color; lbl.textContent=`${ICONS[cat]} ${cat.toUpperCase()}`;
  const line=document.createElement("div"); line.className="cat-line"; line.style.backgroundColor=color;
  hdr.appendChild(lbl); hdr.appendChild(line);
  const tc=document.createElement("div");
  renderTaskList(dateStr,cat,tc);
  sec.appendChild(hdr); sec.appendChild(tc);
  return sec;
}

function clearCompleted(dateStr) {
  let n=0;
  for(const cat of CATEGORIES){ const t=getTasks(dateStr,cat), r=t.filter(x=>!x.done); n+=t.length-r.length; saveTasks(dateStr,cat,r); }
  renderPlanner();
  showToast(n>0?`Cleared ${n} completed task${n!==1?"s":""}`:"No completed tasks to clear");
}

function manualCarry(dateStr) {
  const next=dateStrOffset(1);
  let n=0;
  for(const cat of CATEGORIES){
    const tasks=getTasks(dateStr,cat), inc=tasks.filter(t=>!t.done); if(!inc.length) continue;
    const ex=getTasks(next,cat), exTxt=new Set(ex.map(t=>t.text.trim().toLowerCase()));
    const add=inc.filter(t=>!exTxt.has(t.text.trim().toLowerCase()));
    saveTasks(next,cat,[...ex,...add.map(t=>({id:Date.now()+Math.random(),text:t.text,done:false}))]);
    saveTasks(dateStr,cat,tasks.filter(t=>t.done)); n+=add.length;
  }
  renderPlanner();
  showToast(n>0?`Carried ${n} task${n!==1?"s":""} to tomorrow`:"No incomplete tasks to carry");
}

function renderDayCard(day) {
  const card=document.createElement("div"); card.className="day-card"+(day.isToday?" today":"");
  const hbtn=document.createElement("button"); hbtn.className="day-header";
  const tr=document.createElement("div"); tr.className="day-title-row";
  const dl=document.createElement("span"); dl.className="day-label"; dl.textContent=day.label;
  tr.appendChild(dl);
  if(day.isToday){const b=document.createElement("span");b.className="today-badge";b.textContent="TODAY";tr.appendChild(b);}
  const arr=document.createElement("span"); arr.className="day-arrow";
  const body=document.createElement("div"); body.className="day-body"+(day.isToday?" open":"");
  arr.textContent=day.isToday?"▲":"▼";
  hbtn.appendChild(tr); hbtn.appendChild(arr);
  CATEGORIES.forEach(cat=>body.appendChild(renderCatSection(day.dateStr,cat)));
  if(day.isToday){
    const bar=document.createElement("div"); bar.className="eod-bar";
    const cb=document.createElement("button"); cb.className="eod-btn danger"; cb.textContent="✕ CLEAR COMPLETED";
    cb.addEventListener("click",()=>clearCompleted(day.dateStr));
    const kb=document.createElement("button"); kb.className="eod-btn"; kb.textContent="→ CARRY INCOMPLETE";
    kb.addEventListener("click",()=>manualCarry(day.dateStr));
    bar.appendChild(cb); bar.appendChild(kb); body.appendChild(bar);
  }
  hbtn.addEventListener("click",()=>{const open=body.classList.toggle("open"); arr.textContent=open?"▲":"▼";});
  card.appendChild(hbtn); card.appendChild(body);
  return card;
}

// ─────────────────────────────────────────────
// DEADLINES
// ─────────────────────────────────────────────
const DL_KEY = "planner:deadlines";

function getDeadlines() { try { return JSON.parse(localStorage.getItem(DL_KEY)) || []; } catch { return []; } }
function saveDeadlines(dl) { localStorage.setItem(DL_KEY, JSON.stringify(dl)); }

function daysUntil(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr + "T00:00:00"); // local midnight
  return Math.round((target - today) / 86400000);
}

function countdownColor(days) {
  if (days < 0)  return "#C97E7E";   // overdue — red
  if (days <= 3) return "#C9A97E";   // urgent — amber
  if (days <= 7) return "#C9C47E";   // soon — yellow
  return "#7EB8C9";                  // fine — blue
}

// Pixel-art goose SVG badge (inline, 20×20px grid)
function gooseBadgeSVG(size=18) {
  // Cream body, dark outline, orange open beak — pixel art style
  const p = size / 18; // pixel size
  const px = (x,y,w,h,c) => `<rect x="${x*p}" y="${y*p}" width="${w*p}" height="${h*p}" fill="${c}"/>`;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;flex-shrink:0;">
    ${px(5,1,8,1,'#1a1a1a')}
    ${px(3,2,12,1,'#1a1a1a')}${px(4,2,10,1,'#e8dfc8')}
    ${px(2,3,2,1,'#1a1a1a')}${px(4,3,10,1,'#e8dfc8')}${px(14,3,2,1,'#1a1a1a')}
    ${px(1,4,1,1,'#1a1a1a')}${px(2,4,12,1,'#e8dfc8')}${px(14,4,2,1,'#1a1a1a')}${px(15,4,2,1,'#c9603a')}
    ${px(1,5,1,1,'#1a1a1a')}${px(2,5,12,1,'#e8dfc8')}${px(13,5,1,1,'#1a1a1a')}${px(14,5,3,1,'#c9603a')}${px(17,5,1,1,'#1a1a1a')}
    ${px(1,6,1,1,'#1a1a1a')}${px(2,6,1,1,'#1a1a1a')}${px(3,6,9,1,'#e8dfc8')}${px(12,6,1,1,'#1a1a1a')}${px(13,6,3,1,'#e8a060')}${px(16,6,2,1,'#1a1a1a')}
    ${px(2,7,1,1,'#1a1a1a')}${px(3,7,8,1,'#d4ccb4')}${px(11,7,2,1,'#1a1a1a')}
    ${px(3,8,1,1,'#1a1a1a')}${px(4,8,6,1,'#d4ccb4')}${px(10,8,3,1,'#1a1a1a')}

function renderDeadlines() {
  const section = document.createElement("div"); section.className = "deadlines-section";

  // Header
  const hdr = document.createElement("div"); hdr.className = "deadlines-section-hdr";
  const title = document.createElement("span"); title.className = "deadlines-section-title"; title.textContent = "Upcoming";
  const line = document.createElement("div"); line.className = "deadlines-section-line";
  let chipsVisible = true;
  const toggleBtn = document.createElement("button"); toggleBtn.className = "deadlines-section-toggle"; toggleBtn.textContent = "▲";
  hdr.appendChild(title); hdr.appendChild(line); hdr.appendChild(toggleBtn);
  section.appendChild(hdr);

  const chipsWrap = document.createElement("div");
  section.appendChild(chipsWrap);

  function rebuildChips() {
    chipsWrap.innerHTML = "";

    // Merge standalone deadlines + goals with target dates
    const standalone = getDeadlines().map(d => ({ ...d, _type: "deadline" }));
    const goalItems = getGoals()
      .filter(g => g.targetDate && g.status !== "DONE")
      .map(g => ({ id: "goal_" + g.id, name: g.title, date: g.targetDate, _type: "goal", _goalId: g.id, _cat: g.category }));

    const all = [...standalone, ...goalItems].sort((a,b) => new Date(a.date) - new Date(b.date));

    const chips = document.createElement("div"); chips.className = "dl-chips";

    if (!all.length) {
      const empty = document.createElement("div"); empty.className = "dl-empty"; empty.textContent = "nothing upcoming";
      chips.appendChild(empty);
    }

    all.forEach((dl, idx) => {
      const days = daysUntil(dl.date);
      const color = countdownColor(days);
      const isGoal = dl._type === "goal";

      const chip = document.createElement("div"); chip.className = "dl-chip" + (isGoal ? " goal-chip" : "");

      // Left accent bar
      const accent = document.createElement("div"); accent.className = "dl-chip-accent";
      accent.style.background = isGoal ? (GOAL_CAT_COLORS[dl._cat] || "#7EC97E") : color;
      chip.appendChild(accent);

      // Inner
      const inner = document.createElement("div"); inner.className = "dl-chip-inner";

      // Countdown
      const cd = document.createElement("div"); cd.className = "dl-chip-countdown";
      const daysEl = document.createElement("div"); daysEl.className = "dl-chip-days"; daysEl.style.color = color;
      daysEl.textContent = days < 0 ? Math.abs(days) : days;
      const unitEl = document.createElement("div"); unitEl.className = "dl-chip-unit";
      unitEl.textContent = days < 0 ? "LATE" : days === 0 ? "TODAY" : "DAYS";
      cd.appendChild(daysEl); cd.appendChild(unitEl);
      inner.appendChild(cd);

      // Divider
      const div = document.createElement("div"); div.className = "dl-chip-divider";
      inner.appendChild(div);

      // Info
      const info = document.createElement("div"); info.className = "dl-chip-info";
      const nameEl = document.createElement("div");
      nameEl.className = "dl-chip-name" + (days < 0 ? " overdue" : "");
      nameEl.textContent = dl.name;

      const subRow = document.createElement("div"); subRow.className = "dl-chip-sub";

      if (isGoal) {
        // Goal chip: show goose + category + "go to goals" link
        const gooseWrap = document.createElement("span"); gooseWrap.innerHTML = gooseBadgeSVG(13);
        const catSpan = document.createElement("span"); catSpan.textContent = dl._cat || "Goal";
        catSpan.style.cssText = `color:${GOAL_CAT_COLORS[dl._cat]||"#7EC97E"}88;`;
        const gotoBtn = document.createElement("button"); gotoBtn.className = "dl-chip-goto"; gotoBtn.textContent = "→ GOALS";
        gotoBtn.addEventListener("click", e => {
          e.stopPropagation();
          document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
          document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
          document.querySelector('[data-tab="goals"]').classList.add("active");
          document.getElementById("page-goals").classList.add("active");
        });
        subRow.appendChild(gooseWrap); subRow.appendChild(catSpan); subRow.appendChild(gotoBtn);
        nameEl.style.cursor = "default";
      } else {
        // Standalone deadline: show date + editable date picker
        const dateDisplay = document.createElement("span");
        dateDisplay.textContent = new Date(dl.date + "T00:00:00").toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
        const datePicker = document.createElement("input"); datePicker.type = "date"; datePicker.value = dl.date;
        datePicker.style.display = "none";
        datePicker.addEventListener("change", () => {
          if (!datePicker.value) return;
          const all2 = getDeadlines(); all2[idx].date = datePicker.value; saveDeadlines(all2);
          datePicker.style.display = "none"; dateDisplay.style.display = "";
          rebuildChips();
        });
        datePicker.addEventListener("blur", () => { datePicker.style.display="none"; dateDisplay.style.display=""; });
        subRow.appendChild(dateDisplay); subRow.appendChild(datePicker);

        // Inline name edit
        nameEl.addEventListener("dblclick", () => {
          nameEl.contentEditable = "true"; nameEl.focus();
          const r=document.createRange(); r.selectNodeContents(nameEl); r.collapse(false);
          window.getSelection().removeAllRanges(); window.getSelection().addRange(r);
        });
        nameEl.addEventListener("blur", () => {
          if (nameEl.contentEditable !== "true") return;
          const v=nameEl.textContent.trim();
          if (v) { const all2=getDeadlines(); all2[idx].name=v; saveDeadlines(all2); }
          nameEl.contentEditable="false";
        });
        nameEl.addEventListener("keydown", e => {
          if (e.key==="Enter"){e.preventDefault();nameEl.blur();}
          if (e.key==="Escape"){nameEl.textContent=dl.name;nameEl.contentEditable="false";}
        });
      }

      info.appendChild(nameEl); info.appendChild(subRow);
      inner.appendChild(info);
      chip.appendChild(inner);

      // Actions (only for standalone deadlines)
      if (!isGoal) {
        const acts = document.createElement("div"); acts.className = "dl-chip-actions";
        const calBtn = document.createElement("button"); calBtn.className = "dl-chip-btn"; calBtn.textContent = "📅"; calBtn.style.fontSize="10px";
        calBtn.addEventListener("click", () => {
          const dp = subRow.querySelector("input[type=date]");
          const dd = subRow.querySelector("span");
          if (dp && dd) { dd.style.display="none"; dp.style.display=""; dp.focus(); dp.showPicker?.(); }
        });
        const delBtn = document.createElement("button"); delBtn.className = "dl-chip-btn del"; delBtn.textContent = "×"; delBtn.style.fontSize="16px";
        delBtn.addEventListener("click", () => {
          const all2=getDeadlines(); all2.splice(idx,1); saveDeadlines(all2); rebuildChips();
        });
        acts.appendChild(calBtn); acts.appendChild(delBtn);
        chip.appendChild(acts);
      }

      chips.appendChild(chip);
    });

    // Add row
    const addRow = document.createElement("div"); addRow.className = "dl-add-row";
    const nameIn = document.createElement("input"); nameIn.className = "dl-name-input"; nameIn.placeholder = "new deadline…"; nameIn.type = "text";
    const dateIn = document.createElement("input"); dateIn.className = "dl-date-input"; dateIn.type = "date"; dateIn.min = todayStr();
    const addBtn = document.createElement("button"); addBtn.className = "add-btn";
    addBtn.style.cssText = "border-color:#7EB8C944;color:#7EB8C9;font-size:12px;padding:3px 8px;";
    addBtn.textContent = "add";
    function addDeadline() {
      const name=nameIn.value.trim(), date=dateIn.value;
      if (!name||!date) { showToast("Enter a name and date"); return; }
      const all2=getDeadlines(); all2.push({id:Date.now(),name,date}); saveDeadlines(all2);
      nameIn.value=""; dateIn.value=""; rebuildChips();
    }
    addBtn.addEventListener("click", addDeadline);
    nameIn.addEventListener("keydown", e=>{ if(e.key==="Enter") dateIn.focus(); });
    dateIn.addEventListener("keydown", e=>{ if(e.key==="Enter") addDeadline(); });
    addRow.appendChild(nameIn); addRow.appendChild(dateIn); addRow.appendChild(addBtn);
    chips.appendChild(addRow);

    chipsWrap.appendChild(chips);
  }

  rebuildChips();

  toggleBtn.addEventListener("click", () => {
    chipsVisible = !chipsVisible;
    chipsWrap.style.display = chipsVisible ? "" : "none";
    toggleBtn.textContent = chipsVisible ? "▲" : "▼";
  });

  return section;
}

const GROC_STORES_KEY = "grocery:stores";
const GROC_COLOR = "#A89EC9"; // soft lavender accent for grocery

function getStores() {
  try { return JSON.parse(localStorage.getItem(GROC_STORES_KEY)) || null; }
  catch { return null; }
}
function saveStores(stores) { localStorage.setItem(GROC_STORES_KEY, JSON.stringify(stores)); }
function initStores() {
  if (!getStores()) saveStores(["Costco","Walmart"]);
}

const gKey = (store) => `grocery:items:${store}`;
const getGrocItems = (store) => { try{return JSON.parse(localStorage.getItem(gKey(store)))||[];}catch{return[];} };
const saveGrocItems = (store,items) => localStorage.setItem(gKey(store),JSON.stringify(items));

function renderGrocItemList(store, container) {
  const items = getGrocItems(store);
  container.innerHTML = "";
  if (!items.length) {
    const e=document.createElement("div"); e.className="cat-empty"; e.textContent="nothing here yet"; container.appendChild(e);
  }
  items.forEach((item, idx) => {
    const row=document.createElement("div"); row.className="task-row";
    const check=document.createElement("button");
    check.className="groc-check"+(item.done?" done":"");
    check.style.borderColor=item.done?GROC_COLOR:"#555";
    check.style.backgroundColor=item.done?GROC_COLOR:"transparent";
    check.innerHTML=`<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#0d0d0d" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    check.addEventListener("click",()=>{
      const cur=getGrocItems(store); cur[idx].done=!cur[idx].done; saveGrocItems(store,cur);
      if(cur[idx].done) launchFireworks(check,GROC_COLOR);
      renderGrocItemList(store,container); updateStoreCount(store);
    });
    const text=document.createElement("span");
    text.className="task-text"+(item.done?" done":""); text.textContent=item.text;
    const editBtn=makeEditableText(text, ()=>item.text, v=>{
      const cur=getGrocItems(store); cur[idx].text=v; saveGrocItems(store,cur);
    });
    const del=document.createElement("button"); del.className="task-delete"; del.textContent="×";
    del.addEventListener("click",()=>{ const cur=getGrocItems(store); cur.splice(idx,1); saveGrocItems(store,cur); renderGrocItemList(store,container); updateStoreCount(store); });
    row.appendChild(check); row.appendChild(text); row.appendChild(editBtn); row.appendChild(del);
    container.appendChild(row);
  });
  // add input
  const ir=document.createElement("div"); ir.className="input-row";
  const inp=document.createElement("input"); inp.className="task-input"; inp.placeholder="+ add item"; inp.type="text";
  const btn=document.createElement("button"); btn.className="add-btn"; btn.style.borderColor=GROC_COLOR+"66"; btn.style.color=GROC_COLOR; btn.textContent="add";
  function addItem(){ const v=inp.value.trim(); if(!v) return; const cur=getGrocItems(store); cur.push({id:Date.now(),text:v,done:false}); saveGrocItems(store,cur); renderGrocItemList(store,container); updateStoreCount(store); }
  btn.addEventListener("click",addItem); inp.addEventListener("keydown",e=>{if(e.key==="Enter")addItem();});
  ir.appendChild(inp); ir.appendChild(btn);
  container.appendChild(ir);
}

function updateStoreCount(store) {
  const el=document.getElementById("store-count-"+CSS.escape(store));
  if(!el) return;
  const items=getGrocItems(store), rem=items.filter(i=>!i.done).length;
  el.textContent=rem>0?`${rem} item${rem!==1?"s":""}`:"";
}

function renderStoreCard(store) {
  const card=document.createElement("div"); card.className="store-card";
  const hbtn=document.createElement("button"); hbtn.className="store-header";
  const nw=document.createElement("div"); nw.className="store-name-wrap";
  const nameSpan=document.createElement("span"); nameSpan.className="store-name"; nameSpan.textContent=store;
  const countSpan=document.createElement("span"); countSpan.className="store-count"; countSpan.id="store-count-"+store;
  nw.appendChild(nameSpan); nw.appendChild(countSpan);
  const arr=document.createElement("span"); arr.className="store-arrow"; arr.textContent="▼";
  hbtn.appendChild(nw); hbtn.appendChild(arr);
  const body=document.createElement("div"); body.className="store-body";
  const listContainer=document.createElement("div");
  renderGrocItemList(store, listContainer);
  updateStoreCount(store);

  // Store actions bar
  const actBar=document.createElement("div"); actBar.className="store-actions";

  // Clear checked
  const clearBtn=document.createElement("button"); clearBtn.className="store-act-btn danger"; clearBtn.textContent="✕ CLEAR CHECKED";
  clearBtn.addEventListener("click",()=>{
    const items=getGrocItems(store), n=items.filter(i=>i.done).length;
    saveGrocItems(store, items.filter(i=>!i.done));
    renderGrocItemList(store,listContainer); updateStoreCount(store);
    showToast(n>0?`Cleared ${n} item${n!==1?"s":""}`:"Nothing to clear");
  });

  // Rename store
  const renameBtn=document.createElement("button"); renameBtn.className="store-act-btn"; renameBtn.textContent="✎ RENAME";
  renameBtn.addEventListener("click",()=>{
    nameSpan.contentEditable="true"; nameSpan.focus();
    const range=document.createRange(); range.selectNodeContents(nameSpan); range.collapse(false);
    window.getSelection().removeAllRanges(); window.getSelection().addRange(range);
  });
  nameSpan.addEventListener("blur",()=>{
    if(nameSpan.contentEditable!=="true") return;
    const newName=nameSpan.textContent.trim();
    nameSpan.contentEditable="false";
    if(!newName||newName===store) return;
    const stores=getStores(), idx=stores.indexOf(store);
    if(idx===-1) return;
    // migrate items
    const items=getGrocItems(store); saveGrocItems(newName,items); localStorage.removeItem(gKey(store));
    stores[idx]=newName; saveStores(stores); renderGrocery();
  });
  nameSpan.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();nameSpan.blur();}if(e.key==="Escape"){nameSpan.textContent=store;nameSpan.contentEditable="false";}});

  // Delete store
  const delBtn=document.createElement("button"); delBtn.className="store-act-btn danger"; delBtn.textContent="✕ DELETE STORE";
  delBtn.addEventListener("click",()=>{
    const stores=getStores().filter(s=>s!==store); saveStores(stores);
    localStorage.removeItem(gKey(store)); renderGrocery();
    showToast(`Removed "${store}"`);
  });

  actBar.appendChild(clearBtn); actBar.appendChild(renameBtn); actBar.appendChild(delBtn);
  body.appendChild(listContainer); body.appendChild(actBar);

  hbtn.addEventListener("click",()=>{const open=body.classList.toggle("open"); arr.textContent=open?"▲":"▼";});
  card.appendChild(hbtn); card.appendChild(body);
  return card;
}

function renderGrocery() {
  initStores();
  const stores=getStores(), el=document.getElementById("grocery-app");
  el.innerHTML="";
  el.innerHTML=`<h1>Grocery</h1><div class="subtitle">YOUR SHOPPING LIST</div>`;

  stores.forEach(store=>el.appendChild(renderStoreCard(store)));

  // Add store row
  const addRow=document.createElement("div"); addRow.className="add-store-row";
  const inp=document.createElement("input"); inp.className="store-name-input"; inp.placeholder="Add a store…"; inp.type="text";
  const btn=document.createElement("button"); btn.className="store-add-btn"; btn.textContent="+ store";
  function addStore(){
    const v=inp.value.trim(); if(!v) return;
    const s=getStores(); if(s.includes(v)){showToast("Store already exists");return;}
    s.push(v); saveStores(s); renderGrocery();
  }
  btn.addEventListener("click",addStore); inp.addEventListener("keydown",e=>{if(e.key==="Enter")addStore();});
  addRow.appendChild(inp); addRow.appendChild(btn);
  el.appendChild(addRow);
}

// ── Alt-night logic ──────────────────────────
// Returns true if tonight is the night for this alternating step
function isAltNight(altKey) {
  const last = localStorage.getItem(altKey);
  const today = todayStr();
  if (!last) return true; // never done → do it tonight
  const lastDate = new Date(last);
  const todayDate = new Date(today);
  const diffDays = Math.round((todayDate - lastDate) / 86400000);
  // If last was yesterday → skip tonight. If 2+ days ago → do it.
  // If last was today → already done tonight (handled by checkbox state).
  return diffDays >= 2;
}

function markAltDone(altKey) {
  localStorage.setItem(altKey, todayStr());
}

// ── Per-step completion storage ──────────────
function scKey(stepId) { return SC_PREFIX + todayStr() + ":" + stepId; }
function isStepDone(stepId) { return localStorage.getItem(scKey(stepId)) === "1"; }
function setStepDone(stepId, done) {
  if (done) localStorage.setItem(scKey(stepId), "1");
  else localStorage.removeItem(scKey(stepId));
}

// ── Should a step show as active today ───────
function isStepActiveToday(step) {
  const dow = new Date().getDay();
  if (step.type === "daily") return true;
  if (step.type === "fixed-days") return step.days.includes(dow);
  if (step.type === "weekly-day") return step.day === dow;
  if (step.type === "alt") return isAltNight(step.altKey);
  return true;
}

// ── Progress ring SVG ─────────────────────────
function makeProgressRing(done, total, color) {
  const r = 18, circ = 2 * Math.PI * r;
  const pct = total === 0 ? 0 : done / total;
  const dash = pct * circ;
  const wrap = document.createElement("div"); wrap.className = "sc-prog-ring";
  wrap.innerHTML = `
    <svg width="44" height="44" viewBox="0 0 44 44">
      <circle cx="22" cy="22" r="${r}" fill="none" stroke="#1e1e1e" stroke-width="3.5"/>
      <circle cx="22" cy="22" r="${r}" fill="none" stroke="${color}" stroke-width="3.5"
        stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}"
        stroke-linecap="round" style="transition:stroke-dasharray 0.3s"/>
    </svg>
    <div class="sc-prog-label">${done}/${total}</div>`;
  return wrap;
}

// ── Inline step name editing ──────────────────
// Steps are defined in-memory; edits are persisted in localStorage as overrides
function scNameKey(stepId) { return "sc:name:" + stepId; }
function getStepName(step) { return localStorage.getItem(scNameKey(step.id)) || step.name; }
function saveStepName(stepId, name) { localStorage.setItem(scNameKey(stepId), name); }

// ── Water tracker ─────────────────────────────
const WATER_KEY = () => "sc:water:" + todayStr();
const WATER_GOAL = 8;
function getWater() { return parseInt(localStorage.getItem(WATER_KEY()) || "0"); }
function setWater(n) { localStorage.setItem(WATER_KEY(), Math.max(0, Math.min(WATER_GOAL, n))); }

function renderWaterTracker(wrapper) {
  wrapper.innerHTML = "";
  const cups = getWater();
  wrapper.innerHTML = `<div class="sc-tracker-label">WATER INTAKE</div>`;
  const dots = document.createElement("div"); dots.className = "water-dots";
  for (let i = 0; i < WATER_GOAL; i++) {
    const d = document.createElement("div");
    d.className = "water-dot" + (i < cups ? " filled" : "");
    d.title = `${i+1} cup${i+1!==1?"s":""}`;
    d.addEventListener("click", () => {
      setWater(i < cups && i === cups - 1 ? cups - 1 : i + 1);
      launchWaterRipple(d);
      renderWaterTracker(wrapper);
    });
    dots.appendChild(d);
  }
  wrapper.appendChild(dots);
  const sub = document.createElement("div"); sub.className = "sc-tracker-sub";
  sub.textContent = cups >= WATER_GOAL ? "✓ GOAL MET" : `${cups} / ${WATER_GOAL} cups`;
  sub.style.color = cups >= WATER_GOAL ? "#7EC97E" : "#444";
  wrapper.appendChild(sub);
  const btns = document.createElement("div"); btns.className = "sc-tracker-btns";
  const minus = document.createElement("button"); minus.className = "sc-tracker-btn"; minus.textContent = "−";
  minus.addEventListener("click", () => { setWater(getWater() - 1); renderWaterTracker(wrapper); });
  const plus = document.createElement("button"); plus.className = "sc-tracker-btn primary"; plus.textContent = "+";
  plus.style.cssText = "color:#7EB8C9;border-color:#7EB8C944;";
  plus.addEventListener("click", () => { setWater(getWater() + 1); renderWaterTracker(wrapper); });
  btns.appendChild(minus); btns.appendChild(plus); wrapper.appendChild(btns);
}

// ── Multivitamin tracker ──────────────────────
const MULTI_KEY = () => "sc:multi:" + todayStr();
function getMulti() { return localStorage.getItem(MULTI_KEY()) === "1"; }
function setMulti(v) { if (v) localStorage.setItem(MULTI_KEY(), "1"); else localStorage.removeItem(MULTI_KEY()); }

function renderMultiTracker(wrapper) {

// ── Render a single routine section ──────────
function renderRoutineSection(containerId, steps, title, subtitle, color) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = "";

  // Count active steps for progress
  const activeSteps = steps.filter(s => isStepActiveToday(s));
  const doneCount   = activeSteps.filter(s => isStepDone(s.id)).length;
  const totalCount  = activeSteps.length;

  // Progress banner
  const prog = document.createElement("div"); prog.className = "sc-progress";
  const ring = makeProgressRing(doneCount, totalCount, color);
  const pt   = document.createElement("div"); pt.className = "sc-prog-text";
  const allDone = doneCount === totalCount && totalCount > 0;
  pt.innerHTML = `<div class="sc-prog-title">${allDone ? "✓ ALL DONE" : `${totalCount - doneCount} REMAINING`}</div>
    <div class="sc-prog-sub">${title.toUpperCase()} · ${new Date().toLocaleDateString("en-CA")}</div>`;
  prog.appendChild(ring); prog.appendChild(pt);
  container.appendChild(prog);

  // Alt-night badges for evening
  const altBadges = steps.filter(s => s.type === "alt");
  if (altBadges.length) {
    const badgeRow = document.createElement("div"); badgeRow.style.cssText = "display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;";
    altBadges.forEach(s => {
      const isTonight = isAltNight(s.altKey);
      const last = localStorage.getItem(s.altKey) || "never";
      const badge = document.createElement("div"); badge.className = "sc-alt-badge";
      badge.style.cssText = `color:${isTonight ? s.altColor : "#444"};border-color:${isTonight ? s.altColor+"66" : "#222"};`;
      badge.innerHTML = `<span>${isTonight ? "●" : "○"}</span><span>${s.altLabel}</span>`;
      badge.title = `Last: ${last}`;
      badgeRow.appendChild(badge);
    });
    container.appendChild(badgeRow);
  }

  // Steps
  steps.forEach(step => {
    const isActive = isStepActiveToday(step);
    const done     = isStepDone(step.id);
    const displayName = getStepName(step);

    const item = document.createElement("div");
    item.className = "sc-item";
    if (!isActive) item.classList.add("conditional");

    const check = document.createElement("button"); check.className = "sc-check" + (done ? " done" : "");
    check.style.borderColor     = done ? color : (isActive ? "#555" : "#2a2a2a");
    check.style.backgroundColor = done ? color : "transparent";
    check.innerHTML = `<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#0d0d0d" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    if (!isActive) check.style.cursor = "default";
    check.addEventListener("click", () => {
      if (!isActive) return;
      const nowDone = !isStepDone(step.id);
      setStepDone(step.id, nowDone);
      if (step.type === "alt" && nowDone) markAltDone(step.altKey);
      if (nowDone) launchFireworks(check, color);
      renderRoutineSection(containerId, steps, title, subtitle, color);
    });

    const body = document.createElement("div"); body.className = "sc-item-body"; body.style.flex = "1";

    // Editable step name
    const nameEl = document.createElement("div"); nameEl.className = "sc-item-name" + (done ? " done" : "");
    nameEl.textContent = displayName;

    // Inline edit button
    const editBtn = document.createElement("button"); editBtn.className = "sc-edit-btn"; editBtn.textContent = "✎";
    editBtn.addEventListener("click", () => {
      if (nameEl.contentEditable === "true") {
        const v = nameEl.textContent.trim();
        if (v) { saveStepName(step.id, v); }
        else { nameEl.textContent = displayName; }
        nameEl.contentEditable = "false"; editBtn.textContent = "✎";
      } else {
        nameEl.contentEditable = "true"; nameEl.focus();
        const range = document.createRange(); range.selectNodeContents(nameEl); range.collapse(false);
        window.getSelection().removeAllRanges(); window.getSelection().addRange(range);
        editBtn.textContent = "✓";
      }
    });
    nameEl.addEventListener("keydown", e => {
      if (e.key === "Enter") { e.preventDefault(); editBtn.click(); }
      if (e.key === "Escape") { nameEl.textContent = displayName; nameEl.contentEditable = "false"; editBtn.textContent = "✎"; }
    });
    nameEl.addEventListener("blur", () => {
      if (nameEl.contentEditable !== "true") return;
      const v = nameEl.textContent.trim(); if (v) saveStepName(step.id, v);
      nameEl.contentEditable = "false"; editBtn.textContent = "✎";
    });

    body.appendChild(nameEl);

    if (step.tag) {
      const tag = document.createElement("div"); tag.className = "sc-item-tag";
      tag.style.cssText = `color:${isActive ? step.tagColor : "#333"};background:${isActive ? step.tagColor+"18" : "transparent"};border:1px solid ${isActive ? step.tagColor+"44" : "#222"};`;
      tag.textContent = step.tag; body.appendChild(tag);
    }

    if (!isActive) {
      const noteEl = document.createElement("div"); noteEl.className = "sc-item-note";
      if (step.type === "fixed-days") noteEl.textContent = `not today · ${step.days.map(d=>["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d]).join(" & ")} only`;
      else if (step.type === "weekly-day") noteEl.textContent = `not today · ${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][step.day]}s only`;
      else if (step.type === "alt") noteEl.textContent = `not tonight · last: ${localStorage.getItem(step.altKey)||"never"}`;
      body.appendChild(noteEl);
    } else if (step.note) {
      const noteEl = document.createElement("div"); noteEl.className = "sc-item-note"; noteEl.textContent = step.note;
      body.appendChild(noteEl);
    }

    item.appendChild(check); item.appendChild(body); item.appendChild(editBtn);
    container.appendChild(item);
  });

  // Reset button
  const resetBar = document.createElement("div"); resetBar.style.cssText = "margin-top:16px;padding-top:12px;border-top:1px solid #1a1a1a;";
  const resetBtn = document.createElement("button"); resetBtn.className = "eod-btn";
  resetBtn.style.cssText = "width:100%;font-size:10px;";
  resetBtn.textContent = "↺ RESET TODAY'S ROUTINE";
  resetBtn.addEventListener("click", () => {
    activeSteps.forEach(s => setStepDone(s.id, false));
    renderRoutineSection(containerId, steps, title, subtitle, color);
    showToast("Routine reset");
  });
  resetBar.appendChild(resetBtn);
  container.appendChild(resetBar);
}
