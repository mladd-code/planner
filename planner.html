<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Weekly Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0a0a0a; color: #d4d4d4; font-family: 'DM Sans', sans-serif; }
  body { overflow-x: hidden; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  #app { max-width: 480px; margin: 0 auto; padding: 20px 16px 60px; position: relative; }

  h1 { font-family: 'DM Serif Display', serif; font-size: 30px; color: #e8e0d0; margin-bottom: 2px; }
  .subtitle { font-family: 'DM Mono', monospace; font-size: 12px; color: #555; letter-spacing: 0.08em; margin-bottom: 16px; }

  .streak-banner { display: flex; align-items: center; gap: 12px; background: #111; border: 1px solid #222; border-radius: 6px; padding: 12px 14px; margin-bottom: 20px; }
  .streak-flame { font-size: 24px; line-height: 1; }
  .streak-count { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 600; line-height: 1; color: #C9A97E; }
  .streak-count.zero { color: #444; }
  .streak-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: #444; margin-top: 3px; letter-spacing: 0.06em; }

  .day-card { border-radius: 6px; margin-bottom: 10px; border: 1px solid #181818; background: #0e0e0e; }
  .day-card.today { background: #141414; border-color: #2a2a2a; }
  .day-header { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; background: none; border: none; text-align: left; }
  .day-title-row { display: flex; align-items: center; gap: 10px; }
  .day-label { font-family: 'DM Serif Display', serif; font-size: 22px; color: #888; }
  .day-card.today .day-label { color: #e8e0d0; }
  .today-badge { font-family: 'DM Mono', monospace; font-size: 9px; color: #7EB8C9; border: 1px solid #7EB8C966; border-radius: 2px; padding: 1px 6px; letter-spacing: 1.5px; }
  .day-arrow { color: #555; font-size: 13px; }
  .day-body { padding: 4px 14px 14px; display: none; }
  .day-body.open { display: block; }

  .cat-section { margin-bottom: 14px; }
  .cat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .cat-label { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 700; letter-spacing: 1px; }
  .cat-line { flex: 1; height: 1px; opacity: 0.2; }
  .cat-empty { font-family: 'DM Sans', sans-serif; color: #444; font-size: 14px; font-style: italic; padding-left: 14px; margin-bottom: 4px; }

  .task-row { position: relative; display: flex; align-items: flex-start; gap: 8px; padding: 3px 0 3px 4px; }
  .task-check { width: 18px; height: 18px; min-width: 18px; border-radius: 3px; border: 1.5px solid #555; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 2px; transition: background 0.15s, border-color 0.15s; flex-shrink: 0; }
  .task-check svg { display: none; }
  .task-check.done svg { display: block; }
  .task-text { flex: 1; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #d4d4d4; line-height: 1.5; word-break: break-word; }
  .task-text.done { color: #444; text-decoration: line-through; }
  .task-delete { background: none; border: none; color: #444; cursor: pointer; font-size: 18px; padding: 0 3px; line-height: 1; margin-top: 1px; flex-shrink: 0; }

  .input-row { display: flex; gap: 6px; margin-top: 6px; padding-left: 4px; }
  .task-input { flex: 1; background: #161616; border: none; border-bottom: 1px solid #2a2a2a; color: #aaa; font-size: 14px; font-family: 'DM Mono', monospace; padding: 4px; outline: none; }
  .task-input::placeholder { color: #444; }
  .add-btn { background: none; border-radius: 2px; font-family: 'DM Mono', monospace; font-size: 13px; padding: 3px 10px; cursor: pointer; border: 1px solid; }

  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-family: 'DM Mono', monospace; font-size: 12px; color: #444; }

  .fw-canvas { position: fixed; pointer-events: none; z-index: 999; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const CATEGORIES = ["Research","Work","Exercise","Life"];
const ICONS = {Research:"◈",Work:"◉",Exercise:"◎",Life:"◇"};
const COLORS = {Research:"#7EB8C9",Work:"#C9A97E",Exercise:"#7EC97E",Life:"#C97EAA"};
const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

function getDayRange() {
  const today = new Date();
  return Array.from({length:7},(_,i)=>{
    const d = new Date(today); d.setDate(today.getDate()+i);
    return {label:DAYS[d.getDay()],isToday:i===0,dateStr:d.toLocaleDateString("en-CA")};
  });
}

const sKey = (ds,cat) => `planner:${ds}:${cat}`;
const SKEY = "planner:streak";
const getTasks = (ds,cat) => { try{return JSON.parse(localStorage.getItem(sKey(ds,cat)))||[];}catch{return[];} };
const saveTasks = (ds,cat,t) => localStorage.setItem(sKey(ds,cat),JSON.stringify(t));
const getStreak = () => { try{return JSON.parse(localStorage.getItem(SKEY))||{count:0,lastCompleted:null};}catch{return{count:0,lastCompleted:null};} };
const saveStreak = s => localStorage.setItem(SKEY,JSON.stringify(s));

function launchFireworks(el, color) {
  const rect = el.getBoundingClientRect();
  const size = 120;
  const canvas = document.createElement("canvas");
  canvas.className = "fw-canvas";
  canvas.width = size; canvas.height = size;
  canvas.style.cssText = `width:${size}px;height:${size}px;left:${rect.left+rect.width/2-size/2}px;top:${rect.top+rect.height/2-size/2}px;`;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext("2d");
  const cx=size/2, cy=size/2;
  const r=parseInt(color.slice(1,3),16), g=parseInt(color.slice(3,5),16), b=parseInt(color.slice(5,7),16);
  const pal=[color,`rgb(${Math.min(r+60,255)},${Math.min(g+60,255)},${Math.min(b+60,255)})`,`rgb(${Math.max(r-40,0)},${Math.max(g-40,0)},${Math.max(b-40,0)})`, "#e8e0d0"];
  const N=36;
  const pts = Array.from({length:N},(_,i)=>{
    const a=(i/N)*Math.PI*2, sp=1.5+Math.random()*2.5;
    return {x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-0.8,alpha:1,rad:2+Math.random()*2,col:pal[Math.floor(Math.random()*pal.length)],dec:0.02+Math.random()*0.01};
  });
  function draw(){
    ctx.clearRect(0,0,size,size);
    let alive=false;
    for(const p of pts){
      if(p.alpha<=0) continue; alive=true;
      ctx.save(); ctx.globalAlpha=p.alpha; ctx.fillStyle=p.col;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.rad,0,Math.PI*2); ctx.fill(); ctx.restore();
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.alpha-=p.dec;
    }
    if(alive) requestAnimationFrame(draw); else canvas.remove();
  }
  requestAnimationFrame(draw);
}

function checkStreak(todayStr) {
  let anyTask=false, allDone=true;
  for(const cat of CATEGORIES){
    const t=getTasks(todayStr,cat);
    if(t.length>0){ anyTask=true; if(t.some(x=>!x.done)){allDone=false;break;} }
  }
  if(!anyTask||!allDone) return;
  const s=getStreak();
  if(s.lastCompleted===todayStr) return;
  const yd=new Date(); yd.setDate(yd.getDate()-1);
  const yStr=yd.toLocaleDateString("en-CA");
  const newCount = s.lastCompleted===yStr ? s.count+1 : 1;
  saveStreak({count:newCount,lastCompleted:todayStr});
  renderStreakBanner();
}

function renderStreakBanner() {
  const s=getStreak();
  const flames=s.count>=7?"🔥🔥🔥":s.count>=3?"🔥🔥":s.count>=1?"🔥":"—";
  const el=document.getElementById("streak-banner");
  if(!el) return;
  el.innerHTML=`<span class="streak-flame">${flames}</span><div><div class="streak-count${s.count===0?' zero':''}">${s.count} day${s.count!==1?'s':''}</div><div class="streak-sub">${s.count===0?'COMPLETE TODAY TO START YOUR STREAK':`STREAK · LAST: ${s.lastCompleted}`}</div></div>`;
}

function renderTaskList(dateStr, cat, container) {
  const color=COLORS[cat];
  const tasks=getTasks(dateStr,cat);
  container.innerHTML="";
  if(tasks.length===0){
    const e=document.createElement("div"); e.className="cat-empty"; e.textContent="no tasks"; container.appendChild(e);
  }
  tasks.forEach((task,idx)=>{
    const row=document.createElement("div"); row.className="task-row";
    const check=document.createElement("button");
    check.className="task-check"+(task.done?" done":"");
    check.style.borderColor=task.done?color:"#555";
    check.style.backgroundColor=task.done?color:"transparent";
    check.innerHTML=`<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#0d0d0d" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    check.addEventListener("click",()=>{
      const cur=getTasks(dateStr,cat);
      cur[idx].done=!cur[idx].done;
      saveTasks(dateStr,cat,cur);
      if(cur[idx].done) launchFireworks(check,color);
      renderTaskList(dateStr,cat,container);
      checkStreak(dateStr);
    });
    const text=document.createElement("span");
    text.className="task-text"+(task.done?" done":"");
    text.textContent=task.text;
    const del=document.createElement("button");
    del.className="task-delete"; del.textContent="×";
    del.addEventListener("click",()=>{
      const cur=getTasks(dateStr,cat); cur.splice(idx,1);
      saveTasks(dateStr,cat,cur); renderTaskList(dateStr,cat,container);
    });
    row.appendChild(check); row.appendChild(text); row.appendChild(del);
    container.appendChild(row);
  });
  const inputRow=document.createElement("div"); inputRow.className="input-row";
  const input=document.createElement("input");
  input.className="task-input"; input.placeholder="+ add task"; input.type="text";
  const btn=document.createElement("button");
  btn.className="add-btn"; btn.style.borderColor=color+"66"; btn.style.color=color; btn.textContent="add";
  function add(){
    const v=input.value.trim(); if(!v) return;
    const cur=getTasks(dateStr,cat);
    cur.push({id:Date.now(),text:v,done:false});
    saveTasks(dateStr,cat,cur);
    renderTaskList(dateStr,cat,container);
  }
  btn.addEventListener("click",add);
  input.addEventListener("keydown",e=>{if(e.key==="Enter")add();});
  inputRow.appendChild(input); inputRow.appendChild(btn);
  container.appendChild(inputRow);
}

function renderCatSection(dateStr, cat) {
  const color=COLORS[cat];
  const sec=document.createElement("div"); sec.className="cat-section";
  const hdr=document.createElement("div"); hdr.className="cat-header";
  const lbl=document.createElement("span"); lbl.className="cat-label"; lbl.style.color=color; lbl.textContent=`${ICONS[cat]} ${cat.toUpperCase()}`;
  const line=document.createElement("div"); line.className="cat-line"; line.style.backgroundColor=color;
  hdr.appendChild(lbl); hdr.appendChild(line);
  const tc=document.createElement("div");
  renderTaskList(dateStr,cat,tc);
  sec.appendChild(hdr); sec.appendChild(tc);
  return sec;
}

function renderDayCard(day) {
  const card=document.createElement("div"); card.className="day-card"+(day.isToday?" today":"");
  const hbtn=document.createElement("button"); hbtn.className="day-header";
  const tr=document.createElement("div"); tr.className="day-title-row";
  const dl=document.createElement("span"); dl.className="day-label"; dl.textContent=day.label;
  tr.appendChild(dl);
  if(day.isToday){const b=document.createElement("span");b.className="today-badge";b.textContent="TODAY";tr.appendChild(b);}
  const arr=document.createElement("span"); arr.className="day-arrow";
  const body=document.createElement("div"); body.className="day-body"+(day.isToday?" open":"");
  arr.textContent=day.isToday?"▲":"▼";
  hbtn.appendChild(tr); hbtn.appendChild(arr);
  CATEGORIES.forEach(cat=>body.appendChild(renderCatSection(day.dateStr,cat)));
  hbtn.addEventListener("click",()=>{
    const open=body.classList.toggle("open"); arr.textContent=open?"▲":"▼";
  });
  card.appendChild(hbtn); card.appendChild(body);
  return card;
}

function render() {
  const days=getDayRange();
  const app=document.getElementById("app");
  app.innerHTML="";
  const hdr=document.createElement("div");
  hdr.innerHTML=`<h1>Weekly Planner</h1><div class="subtitle">${days[0].label.toUpperCase()} → ${days[6].label.toUpperCase()}</div>`;
  app.appendChild(hdr);
  const banner=document.createElement("div"); banner.id="streak-banner"; banner.className="streak-banner";
  app.appendChild(banner); renderStreakBanner();
  days.forEach(day=>app.appendChild(renderDayCard(day)));
  const leg=document.createElement("div"); leg.className="legend";
  CATEGORIES.forEach(cat=>{
    const item=document.createElement("div"); item.className="legend-item";
    item.innerHTML=`<span style="color:${COLORS[cat]}">${ICONS[cat]}</span><span>${cat}</span>`;
    leg.appendChild(item);
  });
  app.appendChild(leg);
}

render();
</script>
</body>
</html>
